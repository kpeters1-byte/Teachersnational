<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You Are An Idiot</title>
    <style>
        body {
            background-color: white;
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        /* Style for the bouncing windows */
        .idiot-window {
            position: absolute;
            width: 250px;
            height: 150px;
            background: #eee;
            border: 3px solid #000;
            box-shadow: 10px 10px 0px #888;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 20px;
            user-select: none;
        }
        .flash-black { background-color: black; color: white; }
        .flash-white { background-color: white; color: black; }
        
        #start-btn {
            padding: 20px 40px;
            font-size: 24px;
            cursor: pointer;
            z-index: 10000;
        }
    </style>
</head>
<body>

    <button id="start-btn">Click to Start</button>

    <script>
      const startBtn = document.getElementById('start-btn');

startBtn.addEventListener('click', () => {
    // This will open ONE actual browser window because it is inside a click event
    let newWindow = window.open(
        'https://example.com', 
        '_blank', 
        'width=400,height=300,left=100,top=100'
    );

    // This loop will be blocked by modern browser security settings!
    for (let i = 0; i < 5; i++) {
        window.open('https://example.com', '_blank', 'width=300,height=300');
    }
});

    </script>
</body>
</html>
